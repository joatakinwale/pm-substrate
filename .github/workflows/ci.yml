name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pm
          POSTGRES_PASSWORD: pm_dev_password
          POSTGRES_DB: pm_substrate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pm -d pm_substrate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Match the local .env shape so the same migrate + test path runs.
      PM_DATABASE_URL: postgres://pm:pm_dev_password@127.0.0.1:5432/pm_substrate
      PM_DEV_TENANT_ID: tenant_dev
      PM_LOG_LEVEL: warn

    steps:
      - uses: actions/checkout@v4

      # No `version:` here — pnpm version is taken from package.json's
      # `packageManager` field (pnpm 10.0.0). Specifying both was the
      # silent CI-failure root cause caught 2026-05-03.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate capability contracts
        run: pnpm validate-contracts --strict

      - name: Guardrails (budgets, name-depth, isolation)
        run: pnpm validate:budgets

      - name: Zero-edit plug-in gate (anti-fixation)
        run: pnpm validate:zero-edit

      - name: Build
        run: pnpm build

      - name: Migrate dev DB
        run: pnpm db:migrate

      - name: Seed dev tenant
        run: pnpm db:seed

      - name: Test
        run: pnpm test

      - name: Amnesia-resume headline number (T4)
        run: pnpm evals:amnesia
