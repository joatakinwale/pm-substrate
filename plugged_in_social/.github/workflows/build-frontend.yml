name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-frontend.yml'

jobs:
  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Next.js 16 requires Node >=20.9.0. Bumped from 18 — the
          # repo's own next.config.ts uses syntax/APIs that don't exist
          # on 18 and ``next build`` refuses to start.
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run typecheck
        working-directory: ./frontend
        run: npm run typecheck

      - name: Run build
        working-directory: ./frontend
        # Match the public build-time contract in frontend/Dockerfile.
        # Cloudflare/OpenNext owns the real deploy; this job only proves
        # the current tree compiles with the same NEXT_PUBLIC_* surface.
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || vars.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiJ9.dummy.dummy' }}
          NEXT_PUBLIC_ORG_SLUG: ${{ secrets.NEXT_PUBLIC_ORG_SLUG || vars.NEXT_PUBLIC_ORG_SLUG || 'stevie-social' }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || vars.NEXT_PUBLIC_SITE_URL || 'https://stevie.social' }}
          NEXT_PUBLIC_CALCOM_URL: ${{ secrets.NEXT_PUBLIC_CALCOM_URL || vars.NEXT_PUBLIC_CALCOM_URL || 'https://cal.com' }}
          NEXT_PUBLIC_CALCOM_USERNAME: ${{ secrets.NEXT_PUBLIC_CALCOM_USERNAME || vars.NEXT_PUBLIC_CALCOM_USERNAME || 'kelsie' }}
          NEXT_PUBLIC_CALCOM_EVENT_SLUG: ${{ secrets.NEXT_PUBLIC_CALCOM_EVENT_SLUG || vars.NEXT_PUBLIC_CALCOM_EVENT_SLUG || 'strategy-call' }}
          NEXT_PUBLIC_SSE_PUBSUB_URL: ${{ secrets.NEXT_PUBLIC_SSE_PUBSUB_URL || vars.NEXT_PUBLIC_SSE_PUBSUB_URL || 'http://localhost:8787' }}
        run: npm run build

  notify:
    needs: validate-frontend
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name == 'push' }}
    steps:
      - name: Send Mattermost notification
        run: |
          if [ "${{ needs.validate-frontend.result }}" == "success" ]; then
            STATUS="✅ SUCCESS"
          else
            STATUS="❌ FAILED"
          fi

          MESSAGE="**Frontend Validation ${STATUS}** | Cloudflare/OpenNext owns deployment | Commit: \`${GITHUB_SHA::8}\` | Branch: ${{ github.ref_name }} | Author: ${{ github.actor }}"

          curl -i -X POST "${{ secrets.MATTERMOST_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"${MESSAGE}\"}" || echo "Notification failed but continuing"
