<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stevie Social — Phased Development Roadmap PRD</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
:root {
  --sg:#089140; --or:#ff5229; --sb:#7ac9e8; --ch:#edff6b; --lv:#d1bff2;
  --bg:#0b0b10; --card:#131318; --bdr:#232330; --txt:#e2e8f0; --dim:#94a3b8; --mut:#64748b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Plus Jakarta Sans',system-ui,sans-serif; background:var(--bg); color:var(--txt); line-height:1.7; }

/* HEADER */
.hdr { padding:28px 40px; border-bottom:1px solid var(--bdr); display:flex; justify-content:space-between; align-items:flex-end; }
.hdr-brand { font-family:'Archivo Black',sans-serif; font-size:22px; letter-spacing:-.5px; }
.hdr-brand span { color:var(--sg); }
.hdr-sub { font-size:12px; color:var(--mut); margin-top:4px; }
.hdr-right { display:flex; gap:10px; align-items:center; }
.hdr-tag { padding:4px 12px; border:1px solid var(--bdr); border-radius:4px; font-size:10px; font-weight:600; letter-spacing:.3px; color:var(--mut); }

/* NAV */
.nav { display:flex; gap:0; border-bottom:1px solid var(--bdr); overflow-x:auto; position:sticky; top:0; z-index:99; background:var(--bg); }
.nav-btn { background:none; border:none; border-bottom:2px solid transparent; padding:14px 20px; font-size:12px; font-weight:500; color:var(--mut); cursor:pointer; white-space:nowrap; font-family:inherit; transition:all .15s; }
.nav-btn:hover { color:var(--txt); }
.nav-btn.on { color:var(--sg); border-bottom-color:var(--sg); font-weight:700; }

/* LAYOUT */
.wrap { max-width:1200px; margin:0 auto; padding:36px 40px; }
.pnl { display:none; } .pnl.on { display:block; animation:fi .25s ease; }
@keyframes fi { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

/* TYPO */
.h1 { font-family:'Archivo Black',sans-serif; font-size:28px; letter-spacing:-.5px; margin-bottom:8px; }
.h2 { font-family:'Archivo Black',sans-serif; font-size:20px; letter-spacing:-.3px; margin-bottom:6px; margin-top:36px; }
.h3 { font-family:'Archivo Black',sans-serif; font-size:15px; margin-bottom:10px; margin-top:24px; }
.sub { color:var(--dim); font-size:13px; margin-bottom:28px; max-width:720px; line-height:1.8; }
.divider { width:48px; height:3px; background:var(--sg); border-radius:2px; margin-bottom:20px; }
p { font-size:13px; color:var(--dim); line-height:1.8; margin-bottom:14px; }

/* BADGES */
.tag { display:inline-block; padding:3px 10px; border-radius:4px; font-size:10px; font-weight:600; letter-spacing:.3px; }
.tag-green { background:#08914018; color:var(--sg); }
.tag-orange { background:#ff522918; color:var(--or); }
.tag-blue { background:#7ac9e818; color:var(--sb); }
.tag-yellow { background:#edff6b18; color:#b8c920; }
.tag-purple { background:#d1bff218; color:#a78bfa; }
.tag-red { background:#ef444418; color:#ef4444; }
.tag-dim { background:#94a3b818; color:var(--dim); }

/* CARDS */
.card { background:var(--card); border:1px solid var(--bdr); border-radius:10px; padding:20px; margin-bottom:14px; transition:border-color .2s; }
.card:hover { border-color:#3a3a4a; }

/* GRIDS */
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
.g4 { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }

/* TABLES */
.tbl { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:20px; }
.tbl th { text-align:left; padding:10px 14px; font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:var(--mut); border-bottom:1px solid var(--bdr); font-weight:600; }
.tbl td { padding:12px 14px; border-bottom:1px solid #1a1a24; vertical-align:top; color:var(--dim); }
.tbl tr:hover td { background:#16161e; }

/* TIMELINE */
.timeline { position:relative; padding-left:28px; margin-top:20px; }
.timeline::before { content:''; position:absolute; left:8px; top:0; bottom:0; width:2px; background:var(--bdr); }
.tl-item { position:relative; margin-bottom:28px; }
.tl-dot { position:absolute; left:-24px; top:4px; width:14px; height:14px; border-radius:50%; border:2px solid var(--bg); }
.tl-head { font-weight:700; font-size:14px; margin-bottom:4px; }
.tl-meta { font-size:11px; color:var(--mut); margin-bottom:8px; }

/* PHASE CARDS */
.phase-card { background:var(--card); border:1px solid var(--bdr); border-radius:12px; overflow:hidden; margin-bottom:20px; }
.phase-header { padding:18px 22px; border-bottom:1px solid var(--bdr); display:flex; justify-content:space-between; align-items:center; }
.phase-title { font-family:'Archivo Black',sans-serif; font-size:16px; display:flex; align-items:center; gap:10px; }
.phase-body { padding:20px 22px; }
.phase-section { margin-bottom:20px; }
.phase-section-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--mut); margin-bottom:10px; }

/* CHECKLIST */
.checklist { list-style:none; padding:0; }
.checklist li { padding:6px 0; font-size:12px; color:var(--dim); border-bottom:1px solid #1a1a24; display:flex; gap:8px; align-items:flex-start; }
.checklist li .chk { font-weight:700; flex-shrink:0; width:16px; }

/* DEPENDENCY ARROWS */
.dep-flow { display:flex; align-items:center; gap:0; margin:16px 0; flex-wrap:wrap; }
.dep-box { background:var(--card); border:1px solid var(--bdr); border-radius:8px; padding:10px 16px; font-size:11px; font-weight:600; }
.dep-arrow { color:var(--sg); font-weight:700; font-size:16px; padding:0 8px; }

/* KPI TABLE */
.kpi-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #1a1a24; font-size:12px; }
.kpi-label { color:var(--dim); }
.kpi-target { font-weight:700; }

/* STATUS INDICATOR */
.status { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600; }
.status-dot { width:8px; height:8px; border-radius:50%; }

/* PROGRESS BAR */
.progress-bar { height:6px; background:#1a1a24; border-radius:3px; overflow:hidden; margin-top:6px; }
.progress-fill { height:100%; border-radius:3px; }

@media (max-width:900px) { .g2,.g3,.g4 { grid-template-columns:1fr; } .wrap { padding:20px; } }
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-brand">stevie <span>social</span></div>
    <div class="hdr-sub">Phased Development Roadmap PRD — JOAT Labs + Stevie Social</div>
  </div>
  <div class="hdr-right">
    <span class="hdr-tag">PRD v1.0</span>
    <span class="hdr-tag">April 2026</span>
  </div>
</div>

<div class="nav" id="nav"></div>
<div class="wrap" id="wrap"></div>

<script>
const C = { sg:'#089140', or:'#ff5229', sb:'#7ac9e8', ch:'#edff6b', lv:'#d1bff2' };
const tag = (c,t) => `<span class="tag" style="background:${c}18;color:${c}">${t}</span>`;

const panels = [
  { id:'overview', label:'Overview' },
  { id:'current', label:'Current State' },
  { id:'phase1', label:'Phase 1' },
  { id:'phase2', label:'Phase 2' },
  { id:'phase3', label:'Phase 3' },
  { id:'phase4', label:'Phase 4' },
  { id:'phase5', label:'Phase 5' },
  { id:'phase6', label:'Phase 6' },
  { id:'phase7', label:'Phase 7' },
  { id:'metrics', label:'Success Metrics' },
  { id:'risks', label:'Risks & Dependencies' },
  { id:'open', label:'Open Questions' },
];

// NAV
document.getElementById('nav').innerHTML = panels.map((p,i) =>
  `<button class="nav-btn${i===0?' on':''}" onclick="show('${p.id}')">${p.label}</button>`
).join('');

function show(id) {
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('on', panels[i].id===id));
  document.querySelectorAll('.pnl').forEach(p => p.classList.toggle('on', p.id===id));
}

// ─── OVERVIEW PANEL ───
function renderOverview() {
  return `
<div class="h1">Stevie Social Platform — Phased Development Roadmap</div>
<div class="divider"></div>
<div class="sub">
  A comprehensive product requirements document for building Stevie Social's all-in-one agency platform. This PRD transforms the existing strategy guide, mockups, and technical specifications into an actionable, phased development plan with clear requirements, acceptance criteria, dependencies, and success metrics for each phase.
</div>

<div class="h2">Problem Statement</div>
<p>Stevie Social currently operates across 14 separate tools — Squarespace, Calendly, QuickBooks, Stripe, ClickUp, Flodesk, Typeform, Zapier, Metricool, Dropbox, Descript, Loom, ChatGPT, and manual processes — to manage their marketing agency. This fragmentation creates three compounding problems: client data is siloed across systems requiring manual reconciliation, the Compound Method framework (Protect → Deepen → Amplify) cannot be tracked programmatically across tools, and the current stack costs $500–$1,500/month in subscriptions with no path to productizing the workflow for other agencies.</p>
<p>The cost of not solving this: every new client compounds the manual overhead, the Compound Method loses fidelity as it passes through disconnected tools, and the SaaS resale opportunity ($300/month × 20 agencies = $72K/year recurring) remains unrealized.</p>

<div class="h2">Goals</div>
<div class="g2">
  <div class="card">
    <div style="font-size:10px;font-weight:700;color:${C.sg};margin-bottom:8px;letter-spacing:.5px">USER GOALS</div>
    <ul class="checklist">
      <li><span class="chk" style="color:${C.sg}">→</span> Single login to manage the full client lifecycle from lead to reporting</li>
      <li><span class="chk" style="color:${C.sg}">→</span> Compound Method phase tracking (Protect/Deepen/Amplify) embedded in every workflow</li>
      <li><span class="chk" style="color:${C.sg}">→</span> Clients self-serve approvals, view reports, and manage billing in a branded portal</li>
      <li><span class="chk" style="color:${C.sg}">→</span> AI-assisted content generation that respects per-client brand voice profiles</li>
    </ul>
  </div>
  <div class="card">
    <div style="font-size:10px;font-weight:700;color:${C.or};margin-bottom:8px;letter-spacing:.5px">BUSINESS GOALS</div>
    <ul class="checklist">
      <li><span class="chk" style="color:${C.or}">→</span> Reduce monthly tool spend from $500–$1,500 to $150–$650 within 12 months</li>
      <li><span class="chk" style="color:${C.or}">→</span> Decrease client onboarding time from 2 weeks (manual) to 48 hours (automated)</li>
      <li><span class="chk" style="color:${C.or}">→</span> Build multi-tenant SaaS foundation to resell to other agencies by end of Phase 4</li>
      <li><span class="chk" style="color:${C.or}">→</span> Achieve 2-year payback on development investment through SaaS revenue</li>
    </ul>
  </div>
</div>

<div class="h2">Non-Goals (v1)</div>
<div class="card">
  <ul class="checklist">
    <li><span class="chk" style="color:${C.or}">✕</span> <strong>Build a video editor</strong> — Descript/CapCut remain external tools. Platform handles organization, review, and approval only. (Too complex: $100M+ category)</li>
    <li><span class="chk" style="color:${C.or}">✕</span> <strong>Replace QuickBooks for agency bookkeeping</strong> — Platform handles client billing only. Agency internal books stay in QuickBooks or export CSV. (Separate concern)</li>
    <li><span class="chk" style="color:${C.or}">✕</span> <strong>White-label marketplace</strong> — Multi-tenant architecture ships in Phase 1, but a self-serve signup and marketplace is post-v1. (Premature before product-market fit)</li>
    <li><span class="chk" style="color:${C.or}">✕</span> <strong>Mobile native apps</strong> — Responsive web app only. Native apps are post-launch if demand warrants. (Platform validation first)</li>
    <li><span class="chk" style="color:${C.or}">✕</span> <strong>Self-hosted email delivery infrastructure</strong> — Use Amazon SES / Resend. Building SMTP infra is non-negotiably out of scope. (Email deliverability is a multi-year problem)</li>
  </ul>
</div>

<div class="h2">Architecture Overview</div>
<p>Path B: Full hybrid custom build — custom Next.js + FastAPI frontend/backend, with proven API services for commodity features.</p>
<div class="g3" style="margin-top:16px">
  <div class="card" style="border-left:3px solid ${C.sg}">
    <div style="font-size:10px;font-weight:700;color:${C.sg};margin-bottom:8px">FRONTEND</div>
    <div style="font-size:12px;color:var(--dim);line-height:1.7">Next.js 15 + Tailwind CSS + shadcn/ui on Vercel. SSR for SEO. Cal.com (self-hosted) for booking. TipTap for rich text editing.</div>
  </div>
  <div class="card" style="border-left:3px solid ${C.or}">
    <div style="font-size:10px;font-weight:700;color:${C.or};margin-bottom:8px">BACKEND</div>
    <div style="font-size:12px;color:var(--dim);line-height:1.7">FastAPI (Python) on Railway. PostgreSQL via Supabase with Row-Level Security. Celery + Redis for background jobs. Alembic for migrations.</div>
  </div>
  <div class="card" style="border-left:3px solid ${C.sb}">
    <div style="font-size:10px;font-weight:700;color:${C.sb};margin-bottom:8px">EDGE / STORAGE</div>
    <div style="font-size:12px;color:var(--dim);line-height:1.7">Cloudflare Workers (5 workers configured). R2 for media storage (zero egress). Mux for video streaming. Resend for transactional email.</div>
  </div>
</div>

<div class="h2">Total Investment Summary</div>
<table class="tbl">
  <thead><tr><th>Phase</th><th>Module</th><th>Solo Timeline</th><th>Cost Range</th><th>Dependencies</th></tr></thead>
  <tbody>
    <tr><td>${tag(C.sg,'1')}</td><td style="font-weight:600;color:var(--txt)">Website + Analytics + Booking</td><td>8–12 weeks</td><td>$12,000–$20,000</td><td>None (foundation)</td></tr>
    <tr><td>${tag(C.or,'2')}</td><td style="font-weight:600;color:var(--txt)">Financial Management</td><td>10–14 weeks</td><td>$15,000–$25,000</td><td>Phase 1 (auth/users)</td></tr>
    <tr><td>${tag(C.sb,'3')}</td><td style="font-weight:600;color:var(--txt)">Proposals + Client Onboarding</td><td>6–10 weeks</td><td>$10,000–$18,000</td><td>Phase 2 (billing)</td></tr>
    <tr><td>${tag('#edff6b','4')}</td><td style="font-weight:600;color:var(--txt)">Project Management</td><td>10–16 weeks</td><td>$15,000–$28,000</td><td>Phase 1 (users/orgs)</td></tr>
    <tr><td>${tag(C.lv,'5')}</td><td style="font-weight:600;color:var(--txt)">Reporting & Analytics</td><td>6–10 weeks</td><td>$8,000–$15,000</td><td>Phases 1–4 (data sources)</td></tr>
    <tr><td>${tag(C.or,'6')}</td><td style="font-weight:600;color:var(--txt)">Email + Forms + Automation</td><td>12–18 weeks</td><td>$18,000–$30,000</td><td>Phase 1 (contacts)</td></tr>
    <tr><td>${tag(C.sg,'7')}</td><td style="font-weight:600;color:var(--txt)">Video + Social + AI</td><td>12–18 weeks</td><td>$18,000–$30,000</td><td>Phase 4 (tasks/approval)</td></tr>
    <tr style="background:#16161e"><td></td><td style="font-weight:800;color:var(--txt)">Total (solo developer)</td><td style="font-weight:700;color:var(--txt)">18–28 months</td><td style="font-weight:700;color:${C.sg}">$96,000–$166,000</td><td></td></tr>
    <tr style="background:#16161e"><td></td><td style="color:var(--mut)">With 25% contingency</td><td style="color:var(--mut)">—</td><td style="font-weight:600;color:var(--mut)">$120,000–$208,000</td><td></td></tr>
  </tbody>
</table>
<p>AI-assisted development (Cursor, Claude Code, Copilot) can realistically reduce these estimates by 20–30%. A 2–3 person team completes in 9–15 months at $119,000–$224,000. Monthly infrastructure cost: $40–$260/month.</p>
`;
}

// ─── CURRENT STATE PANEL ───
function renderCurrent() {
  return `
<div class="h1">Current Development State</div>
<div class="divider"></div>
<div class="sub">Audit of all existing artifacts, code, and specifications as of April 2026. This assessment maps what has been built, what has been designed, and what remains to be developed.</div>

<div class="h2">Artifacts Completed</div>
<div class="g2">
  <div class="card">
    <div style="font-size:10px;font-weight:700;color:${C.sg};margin-bottom:10px">STRATEGY & DESIGN</div>
    <ul class="checklist">
      <li><span class="chk" style="color:${C.sg}">✓</span> Hybrid Architecture & Strategy Guide (PDF, 10+ pages)</li>
      <li><span class="chk" style="color:${C.sg}">✓</span> Interactive Platform Spec (HTML, 7 features with full mockups)</li>
      <li><span class="chk" style="color:${C.sg}">✓</span> Database Schema Spec (HTML, 15 tables with ERD + concurrency notes)</li>

      <li><span class="chk" style="color:${C.sg}">✓</span> Brand Guidelines PDF + Messaging Strategy 2026</li>
      <li><span class="chk" style="color:${C.sg}">✓</span> The Compound Method framework documentation</li>
    </ul>
  </div>
  <div class="card">
    <div style="font-size:10px;font-weight:700;color:${C.sb};margin-bottom:10px">CODE & INFRASTRUCTURE</div>
    <ul class="checklist">
      <li><span class="chk" style="color:${C.sb}">✓</span> FastAPI backend scaffolded — models, schemas, API routes, auth, services</li>
      <li><span class="chk" style="color:${C.sb}">✓</span> Database models: organization, user, booking, lead, page, blog_post, analytics, contact, media_asset, audit_log</li>
      <li><span class="chk" style="color:${C.sb}">✓</span> API routes: auth, analytics, blog, bookings, contacts, leads, media, pages, internal (cron + webhooks)</li>

      <li><span class="chk" style="color:${C.sb}">✓</span> Cloudflare R2 service integration (backend/app/services/cloudflare.py)</li>
    </ul>

</div>

<div class="h2">Separate Product: FlowDylo (coldCallAutomated)</div>
<div class="card">
  <p style="margin-bottom:8px">FlowDylo is a separate AI-powered sales platform for life insurance professionals. It is <strong style="color:${C.sg}">95% production-ready</strong> with complete frontend (React + TypeScript + Vite + Ant Design) and backend (FastAPI + MongoDB + Redis). Features include calendar/appointments, call disposition workflow, communication services (SMS, voicemail), lead follow-up integration, and email campaigns.</p>

</div>

<div class="h2">Development Progress by Phase</div>
${[
  { name:'Phase 1: Website + Analytics + Booking', pct:35, color:C.sg, status:'In Progress',
    done:['FastAPI backend scaffolded with models (organization, user, booking, lead, page, blog_post, analytics)','API routes for auth, bookings, leads, pages, blog, analytics','Cloudflare Workers configured (upload, cache, webhooks, cron, image-transform)','Alembic migration infrastructure','Cloudflare R2 service integration'],
    remaining:['Next.js 15 production frontend build','Cal.com self-hosted deployment and OAuth integration','Umami analytics installation and dashboard','SurveyJS intake form replacing Typeform','TipTap content editor for pages and blog','Supabase PostgreSQL setup with Row-Level Security','Vercel deployment with preview environments'] },
  { name:'Phase 2: Financial Management', pct:5, color:C.or, status:'Designed',
    done:['Database schema designed (invoices table)','UI mockup complete (finance dashboard)','Stripe integration architecture documented'],
    remaining:['Stripe Billing + Invoicing + Customer Portal integration','Payment webhook processing with idempotency','Revenue dashboard with MRR/outstanding/overdue','Celery automated payment reminders','React PDF branded invoice generation','Expense categorization system'] },
  { name:'Phase 3: Proposals + Onboarding', pct:5, color:C.sb, status:'Designed',
    done:['Database schema designed (proposals table)','UI mockup complete (proposal builder with 12 Compound Method blocks)','Workflow architecture documented'],

  { name:'Phase 4: Project Management', pct:5, color:'#b8c920', status:'Designed',
    done:['Database schema designed (projects, tasks, task_comments)','UI mockup complete (13-step Kanban with Compound Method phases)','Real-time architecture designed (Supabase NOTIFY/LISTEN)'],
    remaining:['React DnD Kit Kanban board implementation','Supabase Realtime WebSocket integration','13-step Stevie workflow template engine','Client portal filtered view (Step 9 only)','Time tracking per task','Phase transition criteria automation'] },
  { name:'Phase 5: Reporting & Analytics', pct:5, color:C.lv, status:'Designed',
    done:['Database schema designed (analytics_daily with materialized views)','UI mockup complete (Compound Method phase-specific KPIs)','Backend analytics model and API route scaffolded'],
    remaining:['Recharts interactive visualization components','PostgreSQL materialized views for pre-computed metrics','Celery scheduled report generation','React PDF branded client reports','Client portal filtered dashboard','Phase transition criteria tracking'] },
  { name:'Phase 6: Email + Forms + Automation', pct:2, color:C.or, status:'Designed',
    done:['Database schema designed (contacts, campaigns)','UI mockup complete (campaign builder)','Contacts model and API route scaffolded'],
    remaining:['Listmonk self-hosted deployment','Amazon SES integration','React Email template builder','SurveyJS form builder integration','n8n self-hosted workflow automation','Flodesk subscriber list migration','Contact engagement scoring'] },
  { name:'Phase 7: Video + Social + AI', pct:2, color:C.sg, status:'Designed',
    done:['Database schema designed (assets, social_posts)','UI mockup complete','Media asset model and API route scaffolded','Cloudflare R2 upload worker configured'],
    remaining:['Mux video streaming integration','RecordRTC browser recording','Social media API integrations (Meta, TikTok, LinkedIn, YouTube)','Claude Sonnet + GPT-4o mini content generation','Brand voice profile system','LiteLLM abstraction layer','Social scheduler with Celery'] },
].map(ph => `
  <div class="phase-card">
    <div class="phase-header">
      <div class="phase-title"><span style="color:${ph.color}">${ph.name}</span></div>
      <div style="display:flex;gap:10px;align-items:center">
        <span class="tag" style="background:${ph.color}18;color:${ph.color}">${ph.status}</span>
        <span style="font-size:12px;font-weight:700;color:${ph.color}">${ph.pct}%</span>

    </div>
