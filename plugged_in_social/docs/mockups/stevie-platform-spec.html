<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stevie Social Platform — Technical Specification</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
:root{
  --sg:#089140;--or:#ff5229;--sb:#7ac9e8;--ch:#edff6b;--lv:#d1bff2;
  --bg:#0b0b10;--card:#131318;--bdr:#232330;--txt:#e2e8f0;--dim:#94a3b8;--mut:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--txt);line-height:1.6}

/* HEADER */
.hdr{padding:20px 32px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:flex-end}
.hdr-brand{font-family:'Archivo Black',sans-serif;font-size:20px;letter-spacing:-.5px}
.hdr-brand span{color:var(--sg)}
.hdr-sub{font-size:11px;color:var(--mut);margin-top:2px}
.hdr-right{display:flex;gap:10px;align-items:center;font-size:11px;color:var(--mut)}
.hdr-tag{padding:3px 10px;border:1px solid var(--bdr);border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.3px}

/* NAV */
.nav{display:flex;gap:0;border-bottom:1px solid var(--bdr);overflow-x:auto;position:sticky;top:0;z-index:99;background:var(--bg)}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;padding:12px 18px;font-size:12px;font-weight:500;color:var(--mut);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.nav-btn:hover{color:var(--txt)}
.nav-btn.on{color:var(--sg);border-bottom-color:var(--sg);font-weight:700}

/* PANELS */
.wrap{max-width:1400px;margin:0 auto;padding:28px 32px}
.pnl{display:none}.pnl.on{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* TYPO */
.h2{font-family:'Archivo Black',sans-serif;font-size:24px;letter-spacing:-.3px;margin-bottom:6px}
.h3{font-family:'Archivo Black',sans-serif;font-size:15px;margin-bottom:12px;margin-top:28px}
.sub{color:var(--dim);font-size:13px;margin-bottom:28px;max-width:680px;line-height:1.7}
.divider{width:48px;height:3px;background:var(--sg);border-radius:2px;margin-bottom:20px}

/* BADGES */
.tag{display:inline-block;padding:2px 9px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.3px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:20px;transition:border-color .2s}
.card:hover{border-color:#3a3a4a}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:8px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);border-bottom:1px solid var(--bdr);font-weight:600}
.tbl td{padding:10px 12px;border-bottom:1px solid #1a1a24;vertical-align:top}
.tbl tr:hover td{background:#16161e}

/* ─── MOCKUP FRAMES ─── */
.frame{border:1px solid var(--bdr);border-radius:12px;overflow:hidden;background:#fff;margin-bottom:24px}
.frame-bar{background:#f1f3f5;padding:8px 14px;display:flex;align-items:center;gap:7px;border-bottom:1px solid #e5e7eb}
.frame-dot{width:9px;height:9px;border-radius:50%}
.frame-url{flex:1;background:#fff;border-radius:5px;padding:4px 12px;font-size:10px;color:#868e96;margin-left:8px;font-family:inherit}
.frame-body{color:#1a1a2e;font-size:12px}

/* Mockup internals */
.m-nav{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;border-bottom:1px solid #e9ecef}
.m-btn{padding:7px 18px;border-radius:6px;font-weight:600;font-size:12px;border:none;cursor:default}
.m-kpi{padding:14px;text-align:center}
.m-kpi .val{font-family:'Archivo Black',sans-serif;font-size:22px}
.m-kpi .lbl{font-size:10px;color:#868e96;margin-top:2px}
.m-tbl{width:100%;border-collapse:collapse;font-size:11px}
.m-tbl th{text-align:left;padding:8px 12px;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#868e96;border-bottom:1px solid #e9ecef}
.m-tbl td{padding:10px 12px;border-bottom:1px solid #f1f3f5}
.m-tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:600}
.m-sidebar{border-right:1px solid #e9ecef;padding:14px}
.m-sidebar-item{background:#f8f9fa;border:1px solid #e9ecef;border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:11px;font-weight:500}
.m-col{min-width:160px;flex:0 0 160px}
.m-col-head{font-size:10px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.m-col-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.m-task{background:#f8f9fa;border:1px solid #e9ecef;border-radius:6px;padding:8px;margin-bottom:6px}
.m-task-title{font-size:11px;font-weight:500}
.m-task-meta{margin-top:4px;display:flex;justify-content:space-between;align-items:center}
.m-add{border:1px dashed #ced4da;border-radius:6px;padding:6px;text-align:center;color:#adb5bd;font-size:10px}
.m-bar-chart{display:flex;align-items:flex-end;gap:4px;height:64px}
.m-bar{border-radius:3px;min-width:10px;flex:1}
.m-progress{height:6px;background:#e9ecef;border-radius:3px;overflow:hidden}
.m-progress-fill{height:100%;border-radius:3px}
.m-video{background:#1a1a2e;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;position:relative}
.m-video-dur{position:absolute;bottom:4px;right:6px;background:rgba(0,0,0,.7);padding:1px 6px;border-radius:3px;font-size:9px}

/* ARCH */
.arch{border-radius:10px;padding:16px;margin-bottom:10px}
.arch-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.arch-pills{display:flex;flex-wrap:wrap;gap:6px}
.arch-pill{padding:5px 12px;border-radius:6px;font-size:10px;font-weight:600}
.arch-arrow{text-align:center;color:var(--mut);font-size:12px;padding:4px 0;font-weight:600}

/* DB */
.db{background:var(--card);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.db-head{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.db-name{font-weight:700;color:var(--sg);font-size:13px}
.db-desc{color:var(--dim);font-size:10px;padding:6px 14px}
.db-cols{background:#0a0a10;padding:8px 14px;font-family:'Courier New',monospace;font-size:10px;color:var(--sg);line-height:1.7}
.db-conc{padding:8px 14px;font-size:10px;color:var(--or);line-height:1.5;border-top:1px solid var(--bdr);background:#ff522908}

/* FLOW */
.flow-row{display:flex;gap:10px;margin-bottom:8px;font-size:12px;line-height:1.5}
.flow-from{font-weight:700;min-width:160px;flex-shrink:0}
.flow-to{color:var(--dim)}

/* ─── PHASE 1 DEEP DIVE ─── */
.p1-compare{display:grid;grid-template-columns:1fr 40px 1fr;gap:0;align-items:stretch;margin-bottom:20px}
.p1-compare-col{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:18px}
.p1-compare-arrow{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--sg)}
.p1-flow{display:flex;flex-wrap:wrap;gap:0;align-items:stretch;margin:16px 0}
.p1-flow-step{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;flex:1;min-width:140px;position:relative}
.p1-flow-step::after{content:'\2192';position:absolute;right:-14px;top:50%;transform:translateY(-50%);color:var(--sg);font-weight:700;font-size:16px;z-index:2}
.p1-flow-step:last-child::after{display:none}
.p1-flow-step .step-num{display:inline-block;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-size:10px;font-weight:700;margin-bottom:6px}
.p1-flow-step .step-title{font-weight:700;font-size:12px;margin-bottom:4px}
.p1-flow-step .step-desc{font-size:10px;color:var(--dim);line-height:1.5}
.p1-page{background:var(--card);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:16px}
.p1-page-head{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.p1-page-head .page-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.p1-page-body{padding:16px 18px;font-size:12px;color:var(--dim);line-height:1.7}
.p1-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);margin-bottom:10px;margin-top:24px}
.p1-checklist{list-style:none;padding:0;margin:0}
.p1-checklist li{padding:6px 0;font-size:12px;color:var(--dim);border-bottom:1px solid #1a1a24;display:flex;gap:8px;align-items:flex-start}
.p1-checklist li span.chk{color:var(--sg);font-weight:700;flex-shrink:0}
.p1-checklist li span.add{color:var(--or);font-weight:700;flex-shrink:0}
.p1-feedback{background:#08914010;border:1px solid #08914040;border-radius:10px;padding:20px;margin-top:24px}
.p1-feedback .q{font-size:13px;color:var(--txt);margin-bottom:8px;font-weight:600}
.p1-feedback .hint{font-size:11px;color:var(--dim);margin-bottom:16px;line-height:1.6}
.p1-layer{border-radius:10px;padding:16px;margin-bottom:10px}
.p1-layer-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.p1-layer-pills{display:flex;flex-wrap:wrap;gap:6px}
.p1-layer-pill{padding:5px 12px;border-radius:6px;font-size:10px;font-weight:600}
.p1-layer-arrow{text-align:center;color:var(--mut);font-size:12px;padding:4px 0;font-weight:600}

@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}.wrap{padding:16px}.p1-compare{grid-template-columns:1fr}.p1-compare-arrow{transform:rotate(90deg);padding:8px 0}.p1-flow{flex-direction:column}.p1-flow-step::after{display:none}}
</style>
</head>
<body>

<div class="hdr">
<div>
  <div class="hdr-brand">stevie <span>social</span></div>
  <div class="hdr-sub">Platform Roadmap — A JOAT Labs + Stevie Social Partnership</div>
</div>
<div class="hdr-right">
  <span class="hdr-tag">FOR REVIEW</span>
  <span class="hdr-tag">March 2026</span>
</div>
</div>

<div class="nav" id="nav"></div>
<div class="wrap" id="wrap"></div>

<script>
const C={sg:'#089140',or:'#ff5229',sb:'#7ac9e8',ch:'#edff6b',lv:'#d1bff2'};
const tag=(c,t)=>`<span class="tag" style="background:${c}18;color:${c}">${t}</span>`;

const features=[
{id:'web',name:'Website + Analytics + Booking',phase:1,weeks:'8–12 weeks',replaces:['Squarespace','Calendly','Typeform (intake)'],color:C.sg,
desc:'Custom Next.js marketing site with built-in visitor analytics, intake qualification, and calendar booking. Copy driven by the 2026 Messaging Strategy. Designed to attract $10M-$50M revenue brands seeking a strategic partner, and quietly filter out those looking for quick fixes.',
stack:[
{n:'Next.js 15',r:'Server-rendered pages for SEO. CMS-driven blog with on-demand revalidation. API routes for form handling.'},
{n:'Tailwind CSS + shadcn/ui',r:'Utility styling mapped to Stevie brand tokens. Accessible component library.'},
{n:'Cal.com (self-hosted)',r:'Open-source booking engine. Google Calendar OAuth. Embeddable widget. Free to host.'},
{n:'Umami Analytics',r:'Privacy-first, cookieless visitor tracking. Self-hosted. No consent banner required.'},
{n:'SurveyJS',r:'Multi-step intake form replacing current Typeform. Conditional logic. JSON storage.'},
{n:'Supabase (PostgreSQL)',r:'Database + auth + realtime. Row-Level Security for multi-tenant isolation.'},
{n:'Vercel',r:'Hosting optimized for Next.js. Edge CDN. Automatic HTTPS. Preview deploys for staging.'},
{n:'TipTap Editor',r:'Visual content editor for pages and blog posts. Rich text, images, embeds. Kelsie edits directly.'},
{n:'Margo+Beuys / Clash Display',r:'Brand fonts self-hosted via @font-face from Cloudflare R2.'}],
workflow:[
'Visitor arrives via organic search, social referral, or direct link. Next.js serves the page with Stevie brand fonts and 2026 messaging.',
'Site copy follows the attract/repel framework: "We want a strategic partner, not a posting service" attracts. "Can you go viral?" self-selects out. The wrong-fit visitor should feel aspired, not rejected.',
'Visitor clicks Book a Call. SurveyJS intake form opens — qualifies on company revenue range, current social presence, and goals. Replaces the existing Typeform at form.typeform.com/to/boBuNh98.',
'Qualified visitors see the Cal.com embed with available slots. Unqualified visitors are directed to alternative resources. Cal.com checks Google Calendar availability via OAuth.',
'Booking confirmed. Cal.com webhook fires. FastAPI creates a Lead record in PostgreSQL with all form responses attached. Confirmation email sent via Resend.',
'Admin dashboard shows the full funnel: unique visitors, form starts, form completions, bookings, and booking-to-close rate. Tracks traffic sources and ICP match signals over time.']},

{id:'finance',name:'Financial Management',phase:2,weeks:'10–14 weeks',replaces:['QuickBooks','Stripe (expanded)'],color:C.or,
desc:'Unified invoicing, subscription billing, payment processing, and revenue reporting. Stripe handles all payment infrastructure. Custom dashboard replaces QuickBooks for client billing visibility. Each client row shows their current Compound Method phase.',
stack:[
{n:'Stripe Billing',r:'Recurring subscriptions with automatic charge retries and dunning.'},
{n:'Stripe Invoicing',r:'One-off invoices with PDF generation. First 25 per month free.'},
{n:'Stripe Customer Portal',r:'Client self-service: update payment method, view invoices, manage subscriptions.'},
{n:'Stripe Tax',r:'Automated sales tax calculation per transaction.'},
{n:'FastAPI',r:'Billing logic, webhook processing, revenue aggregation queries.'},
{n:'Celery + Redis',r:'Automated payment reminders (3 days before, overdue at day 1/7/14). Monthly revenue report generation.'},
{n:'React PDF',r:'Custom-branded invoice and report PDFs using Stevie brand colors and typography.'}],
workflow:[
'Admin creates an invoice or subscription from the dashboard. If a proposal was accepted in Phase 3, line items auto-populate.',
'FastAPI calls the Stripe API to create a PaymentIntent (one-time) or Subscription (recurring). A hosted payment link is generated.',
'Client receives a branded email with the payment link. Payment is processed via Stripe Checkout — PCI compliant, no card data touches the platform.',
'Stripe webhook fires on payment success. FastAPI updates the invoice record. An idempotency key on the Stripe event ID prevents duplicate processing.',
'Revenue dashboard updates: MRR, outstanding balance, collected month-to-date, overdue amounts. Filterable by client, date range, and Compound Method phase.',
'Celery runs automated follow-ups: reminders before due date, escalating overdue notices, and monthly revenue summary PDF generation.']},

{id:'proposals',name:'Proposals + Client Onboarding',phase:3,weeks:'6–10 weeks',replaces:['Manual process','Typeform (partial)'],color:C.sb,
desc:'Drag-and-drop proposal builder with the 12-component Compound Method strategy document structure built in. E-signatures via HelloSign. Accepted proposals automatically create projects, invoices, portal access, and onboarding email sequences.',
stack:[
{n:'TipTap Editor',r:'Rich text block editor for proposal content. Drag-and-drop reordering of strategy sections.'},
{n:'HelloSign API',r:'Legally binding e-signatures embedded in proposals.'},
{n:'SurveyJS',r:'Client intake questionnaires and onboarding forms.'},
{n:'FastAPI',r:'Template engine, PDF generation, strategy document assembly.'},
{n:'Resend',r:'Onboarding email sequences: welcome, intake form, brand voice setup, kickoff scheduling.'},
{n:'Celery',r:'Automated pipeline: proposal acceptance triggers project + invoice + portal + email sequence creation.'}],
workflow:[
'Admin selects a proposal template. The 12 Compound Method strategy components are available as structured blocks: executive summary, brand positioning, audience segments, content pillars (3-5 with purpose/voice/outcome), platform strategy, phased framework with transition criteria, guardrails (will/will not post), email strategy, KPIs with numeric targets, sample content calendar, and summary.',
'System auto-populates client data and pricing from the billing module. The guardrails section — what Stevie will and will not post — is required before sending.',
'Proposal is sent via email with a unique secure link. The client can view the full strategy document and pricing in-browser.',
'Client reviews and e-signs via HelloSign. The webhook triggers a cascade: Project created with 13-step pipeline, Invoice generated, Client Portal access provisioned, Onboarding email sequence started.',
'Onboarding sequence fires automatically: welcome email, intake questionnaire (SurveyJS), brand voice profile setup form, and strategy alignment call scheduling via Cal.com.',
'All proposal versions are stored with change history. Only one active proposal per client is allowed (enforced by database constraint).']},

{id:'pm',name:'Project Management',phase:4,weeks:'10–16 weeks',replaces:['ClickUp'],color:C.ch,
desc:"Phase-aware Kanban boards mapped to Stevie's 13-step production workflow. Real-time collaboration via WebSocket. The client portal exposes only Step 9 (Client Approval). Every project tracks which Compound Method phase it is in, with transition criteria checked automatically.",
stack:[
{n:'React DnD Kit',r:'Drag-and-drop Kanban with keyboard accessibility and touch support.'},
{n:'Supabase Realtime',r:'WebSocket-based live updates via PostgreSQL NOTIFY/LISTEN. Sub-100ms latency.'},
{n:'TipTap',r:'Rich text task descriptions with @mentions, checklists, and file embeds.'},
{n:'PostgreSQL + Row-Level Security',r:'Multi-tenant data isolation. Float-based positioning for drag reorder without sibling locks.'},
{n:'Celery',r:'Due date reminders, recurring task generation, automatic step transitions.'},
{n:'Cloudflare R2',r:'Task file attachments stored with zero egress fees.'}],
workflow:[
'Project is created manually or automatically from an accepted proposal. A Compound Method phase is assigned: Protect, Deepen, or Amplify.',
'The 13-step Stevie pipeline auto-generates as columns or task stages: Strategy Alignment, Brainstorm/Ideation, Content Planning and Shot Lists, Pre-Production Call, Shoot, Edit and Asset Organization, Internal Quality Review, Copywriting, Client Approval and Revisions, Scheduling and Distribution, Paid Ads Deployment, Data Tracking, Reporting and Strategic Iteration.',
'Team members are assigned to tasks and notified via email and in-app notification. Assignees include team members (KD, DL), AI-assisted tasks, and client review tasks.',
'Tasks are moved through columns by dragging or changing status. Supabase Realtime broadcasts every change to all connected team members within 100ms.',
'The client portal shows ONLY Step 9 tasks (Client Approval and Revisions). Clients can view content, leave comments, approve, or request revisions — all within the platform.',
'Time tracking runs per task and feeds the reporting module. When Protect phase metrics are met, the system prompts the admin to evaluate transitioning to Deepen.']},

{id:'reporting',name:'Reporting and Analytics',phase:5,weeks:'6–10 weeks',replaces:['Metricool (partial)','Manual reporting'],color:C.lv,
desc:'Dashboards with KPIs specific to each Compound Method phase. In Protect: saves, shares, alignment signals, misaligned inquiry rate. In Deepen: inbound conversation quality, brand recognition, content library depth. In Amplify: cost per qualified lead, paid vs. organic comparison. Auto-generated client reports with Stevie branding.',
stack:[
{n:'Recharts',r:'Interactive charts: line, bar, area, funnel. Responsive and accessible.'},
{n:'FastAPI',r:'Data aggregation endpoints querying pre-computed PostgreSQL views.'},
{n:'PostgreSQL Materialized Views',r:'Nightly refresh via Celery. Pre-computes phase-specific metrics for fast dashboard queries.'},
{n:'Celery',r:'Scheduled report generation (weekly/monthly). Automatic delivery to clients.'},
{n:'Resend',r:'Branded report emails sent on schedule or on-demand.'},
{n:'React PDF (@react-pdf)',r:'PDF export with Stevie brand colors, Margo+Beuys headings, client logo placement.'}],
workflow:[
'Celery cron job runs nightly, aggregating data from all modules into the analytics_daily table with Compound Method phase tagging.',
'Materialized views pre-compute phase-specific KPIs. The reporting service queries views rather than raw tables for consistent sub-second response times.',
'Admin opens the Reports section, selects a client and date range. FastAPI returns aggregated data. Recharts renders interactive visualizations.',
'Compound Method phase comparison view: overlay metrics across phases to show the compounding effect over time. "The 50th post is stronger because the first 49 laid the foundation."',
'Admin can export a branded PDF report or schedule automatic email delivery. Reports use Stevie brand colors, Margo+Beuys headings, and include the client logo.',
'Client portal shows a filtered dashboard with only their permitted metrics. Engagement quality and alignment signals are emphasized over vanity metrics like follower count.']},

{id:'email',name:'Email Marketing + Forms + Automation',phase:6,weeks:'12–18 weeks',replaces:['Flodesk','Typeform','Zapier'],color:C.or,
desc:"Campaign management with audience segmentation, drag-and-drop email builder, visual form builder, and workflow automation. The current Flodesk subscriber list at socialthatspeaks.myflodesk.com migrates here. Email strategy supports Compound Method Phase 2 (Deepen) — deepening relationships beyond algorithm reach.",
stack:[
{n:'Listmonk (self-hosted)',r:'Open-source campaign manager. Audience segmentation, analytics, template management.'},
{n:'Amazon SES',r:'Email delivery infrastructure at $0.10 per 1,000 emails. No subscriber limits.'},
{n:'React Email',r:'JSX-based email template builder. Renders to cross-client HTML. Stevie brand styling built in.'},
{n:'SurveyJS',r:'Drag-and-drop form and survey builder. Conditional logic. Multi-page flows.'},
{n:'n8n (self-hosted)',r:'Visual workflow automation with 400+ integrations. Replaces Zapier. JavaScript and Python code nodes.'},
{n:'FastAPI + Celery',r:'Event bus for triggers. Rate limiting. Scheduled campaign dispatch.'}],
workflow:[
'Admin builds an email template using the React Email editor with Stevie brand colors (Margo+Beuys headings, Clash Display body, brand palette).',
'Audience segment is defined by tags, behavior, and engagement score. The current Flodesk list is migrated and tagged for continuity.',
'Campaign is scheduled. At the scheduled time, Celery dispatches to Listmonk, which sends via Amazon SES. Open and click tracking updates each contact engagement score.',
'Form submissions from SurveyJS trigger webhooks. n8n automation workflows chain actions: create a task, send a follow-up email, update the CRM record, and notify the team.',
'n8n visual workflows replace all current Zapier automations. Custom logic via JavaScript or Python code nodes when integrations are not available out of the box.',
'Email strategy is explicitly tied to Compound Method Phase 2: educational content, trust-building narratives, and nurture sequences that deepen relationships beyond social algorithm reach.']},

{id:'media',name:'Video, Social Media, and AI',phase:7,weeks:'12–18 weeks',replaces:['Dropbox','Descript','Loom','ChatGPT'],color:C.sg,
desc:"Asset management with Cloudflare R2 storage (replacing Dropbox for large video files — zero egress fees), Mux video streaming, browser-based recording (replacing Loom), social scheduling with platform analytics, and AI content generation. Per-client brand voice profiles enforce Stevie's tone: confident, calm, warm authority. AI generates drafts. Humans make decisions.",
stack:[
{n:'Cloudflare R2',r:'Object storage at $0.015/GB/mo with zero egress fees. S3-compatible. Replaces Dropbox for large video files.'},
{n:'Mux',r:'Video streaming with adaptive bitrate, auto-thumbnails, and viewer analytics.'},
{n:'RecordRTC',r:'Browser-based screen and camera recording via getDisplayMedia + MediaRecorder APIs. Replaces Loom.'},
{n:'Meta / TikTok / LinkedIn / YouTube APIs',r:'Social media publishing, scheduling, and engagement analytics per platform.'},
{n:'Claude Sonnet',r:'Creative content generation: captions, post copy, strategy insights. Brand voice profile injected per client.'},
{n:'GPT-4o mini',r:'Utility tasks: grammar checks, sentiment analysis, structured data extraction.'},
{n:'LiteLLM',r:'Model abstraction layer. Swap AI providers per feature without code changes.'}],
workflow:[
'Team uploads video files. Chunked upload streams directly to Cloudflare R2 (handles files over 1GB, which Dropbox currently manages). Mux processes the file for adaptive streaming.',
'Metadata is indexed in PostgreSQL: client, campaign, tags, status, duration, resolution. Folder structure follows Client, Campaign, Asset Type (Raw/Edited/Final), Date.',
'Review workflow: team members add timestamped comments on the video player. At Step 9 of the pipeline, the client views in their portal and approves or requests revisions.',

'Platform APIs return engagement data at intervals. Results feed into analytics_daily. Top-performing organic content is surfaced as candidates for the Compound Method Amplify phase. Only content that has already proven alignment gets amplified.']}

// ─── INIT ───
const tabs=[
{id:'overview',label:'All Modules'},
{id:'phase1',label:'Phase 1 Deep Dive'},
{id:'arch',label:'How It Connects',dev:true},
{id:'schema',label:'Data Model',dev:true},
...features.map(f=>({id:f.id,label:'P'+f.phase+': '+f.name.split('+')[0].split(',')[0].trim(),dev:true}))
];

function go(id){
document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));
document.querySelector('[data-t="'+id+'"]')?.classList.add('on');
document.getElementById('p-'+id)?.classList.add('on');
window.scrollTo({top:0,behavior:'smooth'});
}

const navEl=document.getElementById('nav');
navEl.innerHTML=tabs.map((t,i)=>{
  let sep=(!tabs[i-1]?.dev&&t.dev)?'<span style="border-left:1px solid var(--bdr);margin:6px 4px"></span>':'';
  let devStyle=t.dev?'opacity:.5;font-size:10px':'';
  return sep+`<button class="nav-btn${t.id==='phase1'?' on':''}" data-t="${t.id}" style="${devStyle}">${t.label}</button>`
}).join('');
navEl.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>go(b.dataset.t)));

let html='';
html+=`<div class="pnl" id="p-overview">${renderOverview()}</div>`;
html+=`<div class="pnl on" id="p-phase1">${renderPhase1()}</div>`;
html+=`<div class="pnl" id="p-arch">${renderArch()}</div>`;
html+=`<div class="pnl" id="p-schema">${renderSchema()}</div>`;
features.forEach(f=>{html+=`<div class="pnl" id="p-${f.id}">${renderFeature(f)}</div>`});
document.getElementById('wrap').innerHTML=html;
</script>
