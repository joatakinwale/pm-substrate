<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stevie Social — Database Schema</title>
<style>
:root {
  --sg: #089140;
  --or: #ff5229;
  --sb: #7ac9e8;
  --ch: #edff6b;
  --lv: #d1bff2;
  --bg: #0a0a0a;
  --card: #141414;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --dim: #888;
  --fnd: #089140;
  --p1: #7ac9e8;
  --cf: #f6821f;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Plus Jakarta Sans',system-ui,sans-serif; line-height:1.5; }
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

.header { padding:40px 40px 20px; }
.header h1 { font-family:'Archivo Black',sans-serif; font-size:2.2rem; letter-spacing:-1px; }
.header h1 span { color:var(--sg); }
.header p { color:var(--dim); margin-top:8px; font-size:0.95rem; max-width:700px; }

.legend { display:flex; gap:24px; padding:12px 40px 24px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:8px; font-size:0.85rem; color:var(--dim); }
.legend-dot { width:12px; height:12px; border-radius:3px; }

.tabs { display:flex; gap:8px; padding:0 40px 24px; flex-wrap:wrap; }
.tab { padding:8px 18px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--dim); cursor:pointer; font-size:0.85rem; font-family:inherit; transition:all 0.2s; }
.tab:hover { border-color:#444; color:var(--text); }
.tab.active { background:var(--sg); border-color:var(--sg); color:#000; font-weight:600; }

.content { padding:0 40px 60px; }

/* ── ERD VIEW ── */
.erd-container { position:relative; width:100%; overflow-x:auto; }
.erd-canvas { position:relative; min-width:1200px; min-height:800px; padding:20px; }

.table-card {
  position:absolute; width:280px; background:var(--card);
  border:1px solid var(--border); border-radius:12px; overflow:hidden;
  transition:box-shadow 0.2s, transform 0.2s; cursor:pointer;
}
.table-card:hover { box-shadow:0 8px 32px rgba(0,0,0,0.4); transform:translateY(-2px); }
.table-card.selected { border-color:var(--sg); box-shadow:0 0 0 2px rgba(8,145,64,0.3); }

.table-header {
  padding:12px 16px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.table-header h3 { font-family:'JetBrains Mono',monospace; font-size:0.9rem; font-weight:600; }
.table-badge { font-size:0.65rem; padding:3px 8px; border-radius:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.badge-foundation { background:rgba(8,145,64,0.15); color:var(--fnd); }
.badge-phase1 { background:rgba(122,201,232,0.15); color:var(--p1); }
.badge-cloudflare { background:rgba(246,130,31,0.15); color:var(--cf); }

.table-cols { padding:8px 0; }
.col-row {
  display:flex; align-items:center; gap:8px; padding:4px 16px;
  font-family:'JetBrains Mono',monospace; font-size:0.75rem;
}
.col-row:hover { background:rgba(255,255,255,0.03); }
.col-icon { width:16px; text-align:center; font-size:0.7rem; flex-shrink:0; }
.col-icon.pk { color:#f5c542; }
.col-icon.fk { color:var(--or); }
.col-icon.idx { color:var(--sb); }
.col-name { flex:1; color:var(--text); }
.col-type { color:var(--dim); font-size:0.7rem; }
.col-nullable { color:#555; font-size:0.65rem; }

/* ── DETAIL PANEL ── */
.detail-panel {
  position:fixed; right:-480px; top:0; width:460px; height:100vh;
  background:var(--card); border-left:1px solid var(--border);
  overflow-y:auto; transition:right 0.3s ease; z-index:100;
  padding:32px 24px;
}
.detail-panel.open { right:0; }
.detail-close { position:absolute; top:16px; right:16px; background:none; border:none; color:var(--dim); font-size:1.4rem; cursor:pointer; }
.detail-close:hover { color:var(--text); }
.detail-panel h2 { font-family:'JetBrains Mono',monospace; font-size:1.1rem; margin-bottom:4px; }
.detail-panel .detail-desc { color:var(--dim); font-size:0.85rem; margin-bottom:20px; line-height:1.6; }
.detail-section { margin-bottom:24px; }
.detail-section h4 { font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin-bottom:10px; }
.detail-col { display:grid; grid-template-columns:140px 100px 1fr; gap:4px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:0.8rem; font-family:'JetBrains Mono',monospace; }
.detail-col .dcn { color:var(--text); }
.detail-col .dct { color:var(--sb); }
.detail-col .dcc { color:var(--dim); font-family:'Plus Jakarta Sans',sans-serif; font-size:0.78rem; }
.detail-rel { padding:8px 12px; background:rgba(255,255,255,0.03); border-radius:8px; margin-bottom:8px; font-size:0.82rem; }
.detail-rel span { color:var(--or); font-family:'JetBrains Mono',monospace; }
.detail-idx { padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:0.8rem; font-family:'JetBrains Mono',monospace; }
.detail-idx .idx-name { color:var(--ch); }
.detail-idx .idx-cols { color:var(--dim); margin-left:8px; }
.detail-rls { padding:8px 12px; background:rgba(8,145,64,0.08); border-radius:8px; margin-bottom:8px; font-size:0.82rem; border-left:3px solid var(--sg); }
.detail-rls strong { color:var(--sg); }

/* ── SVG LINES ── */
svg.erd-lines { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
.rel-line { stroke:var(--or); stroke-width:1.5; fill:none; opacity:0.4; }
.rel-line.highlighted { opacity:1; stroke-width:2; }
.rel-dot { fill:var(--or); opacity:0.4; }
.rel-dot.highlighted { opacity:1; }

/* ── TABLE LIST VIEW ── */
.table-list { display:none; }
.table-list.active { display:block; }
.erd-view { display:none; }
.erd-view.active { display:block; }

.list-table { width:100%; border-collapse:collapse; }
.list-table th { text-align:left; padding:10px 16px; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; color:var(--dim); border-bottom:1px solid var(--border); }
.list-table td { padding:10px 16px; border-bottom:1px solid rgba(255,255,255,0.04); font-size:0.85rem; }
.list-table tr:hover td { background:rgba(255,255,255,0.02); }
.mono { font-family:'JetBrains Mono',monospace; font-size:0.82rem; }

/* ── PERFORMANCE VIEW ── */
.perf-view { display:none; }
.perf-view.active { display:block; }
.perf-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(360px,1fr)); gap:20px; }
.perf-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
.perf-card h3 { font-family:'JetBrains Mono',monospace; font-size:0.9rem; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.perf-item { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:0.82rem; }
.perf-item:last-child { border:none; }
.perf-label { color:var(--dim); }
.perf-val { font-family:'JetBrains Mono',monospace; }
.perf-val.good { color:var(--sg); }
.perf-val.warn { color:#f5c542; }
.perf-val.info { color:var(--sb); }

/* ── RLS VIEW ── */
.rls-view { display:none; }
.rls-view.active { display:block; }
.rls-flow { display:flex; flex-direction:column; gap:16px; max-width:800px; }
.rls-step { display:flex; gap:16px; align-items:flex-start; }
.rls-num { width:36px; height:36px; border-radius:50%; background:var(--sg); color:#000; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; flex-shrink:0; }
.rls-body { flex:1; }
.rls-body h4 { font-size:0.95rem; margin-bottom:4px; }
.rls-body p { color:var(--dim); font-size:0.85rem; }
.rls-code { background:rgba(255,255,255,0.04); border-radius:8px; padding:12px 16px; margin-top:8px; font-family:'JetBrains Mono',monospace; font-size:0.78rem; line-height:1.7; overflow-x:auto; }
.rls-code .kw { color:var(--sb); }
.rls-code .fn { color:var(--ch); }
.rls-code .str { color:var(--sg); }
.rls-code .cm { color:#555; }
.rls-arrow { margin-left:16px; width:2px; height:20px; background:var(--border); }

.rls-matrix { width:100%; border-collapse:collapse; margin-top:24px; }
.rls-matrix th { padding:10px 14px; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; color:var(--dim); border-bottom:1px solid var(--border); text-align:center; }
.rls-matrix th:first-child { text-align:left; }
.rls-matrix td { padding:8px 14px; border-bottom:1px solid rgba(255,255,255,0.04); text-align:center; font-size:0.85rem; }
.rls-matrix td:first-child { text-align:left; font-family:'JetBrains Mono',monospace; font-size:0.82rem; }
.rls-yes { color:var(--sg); }
.rls-no { color:#555; }
.rls-limited { color:#f5c542; }
</style>
</head>
<body>

<div class="header">
  <h1><span>Stevie Social</span> — Database Schema</h1>
  <p>Foundation + Phase 1 + Cloudflare Media — 10 tables, PostgreSQL on Coolify. Click any table for full column details, relationships, indexes, and RLS policies.</p>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--fnd)"></div> Foundation</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--p1)"></div> Phase 1</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--cf)"></div> Cloudflare</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f5c542"></div> Primary Key</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--or)"></div> Foreign Key</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--sb)"></div> Indexed</div>
</div>

<div class="tabs">
  <button class="tab active" data-view="erd">Schema Diagram</button>
  <button class="tab" data-view="list">All Columns</button>
  <button class="tab" data-view="perf">Performance</button>
  <button class="tab" data-view="rls">RLS Security</button>
</div>

<div class="content">

<!-- ════════════════════════ ERD VIEW ════════════════════════ -->
<div class="erd-view active" id="view-erd">
<div class="erd-container">
<div class="erd-canvas" id="erdCanvas">
  <svg class="erd-lines" id="erdLines"></svg>
</div>
</div>
</div>

<!-- ════════════════════════ LIST VIEW ════════════════════════ -->
<div class="table-list" id="view-list"></div>

<!-- ════════════════════════ PERF VIEW ════════════════════════ -->
<div class="perf-view" id="view-perf"></div>

<!-- ════════════════════════ RLS VIEW ════════════════════════ -->
<div class="rls-view" id="view-rls"></div>

</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" id="detailClose">&times;</button>
  <div id="detailContent"></div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// SCHEMA DATA
// ════════════════════════════════════════════════════════════
const schema = {
  organizations: {
    layer: 'foundation', desc: 'Multi-tenant root entity. Every other table references org_id back to this. Stores brand settings and Compound Method defaults.',
    columns: [
      { name:'id', type:'UUID', pk:true, note:'gen_random_uuid()' },
      { name:'name', type:'VARCHAR(255)', note:'Organization display name' },
      { name:'slug', type:'VARCHAR(100)', unique:true, idx:true, note:'URL-safe identifier' },
      { name:'plan', type:'VARCHAR(20)', note:'free|starter|pro|enterprise' },
      { name:'domain', type:'VARCHAR(255)', nullable:true, note:'Custom domain' },
      { name:'logo_url', type:'TEXT', nullable:true },
      { name:'settings', type:'JSONB', note:'Brand colors, feature flags, etc.' },
      { name:'compound_method_defaults', type:'JSONB', note:'Protect → Deepen → Amplify config' },
      { name:'is_active', type:'BOOLEAN', note:'Soft disable' },
      { name:'created_at', type:'TIMESTAMPTZ', note:'Auto-set' },
      { name:'updated_at', type:'TIMESTAMPTZ', note:'Auto-trigger' },
    ],
    indexes: ['ix_organizations_slug (slug)'],
    rls: ['org_isolation: id = current_user_org_id()'],
  },
  users: {
    layer: 'foundation', desc: 'Team members and clients within an organization. Supports 5 roles from owner to client. Optimistic locking via version column.',
    columns: [
      { name:'id', type:'UUID', pk:true, note:'gen_random_uuid()' },
      { name:'org_id', type:'UUID', fk:'organizations.id', idx:true },
      { name:'auth_id', type:'VARCHAR(255)', unique:true, nullable:true, idx:true, note:'External auth provider ID' },
      { name:'email', type:'VARCHAR(320)', idx:true },
      { name:'full_name', type:'VARCHAR(255)' },
      { name:'avatar_url', type:'TEXT', nullable:true },
      { name:'role', type:'VARCHAR(20)', note:'owner|admin|editor|viewer|client' },
      { name:'permissions', type:'JSONB', note:'Granular overrides beyond role' },
      { name:'is_active', type:'BOOLEAN' },
      { name:'version', type:'INTEGER', note:'Optimistic locking' },
      { name:'created_at', type:'TIMESTAMPTZ' },
      { name:'updated_at', type:'TIMESTAMPTZ' },
    ],
    indexes: ['ix_users_org_id (org_id)', 'ix_users_auth_id (auth_id)', 'ix_users_email (email)'],
    rls: ['org_isolation: org_id = current_user_org_id()'],
  },
  audit_log: {
    layer: 'foundation', desc: 'Immutable, append-only event log. Never updated or deleted. Records who did what, to which entity, with before/after diff.',
    columns: [
      { name:'id', type:'BIGSERIAL', pk:true, note:'Auto-increment' },
      { name:'org_id', type:'UUID', fk:'organizations.id', idx:true },
      { name:'user_id', type:'UUID', fk:'users.id', nullable:true, idx:true, note:'Null for system events' },
      { name:'action', type:'VARCHAR(50)', idx:true, note:'create|update|delete|login|export' },
      { name:'entity_type', type:'VARCHAR(50)', note:'lead|booking|page|blog_post' },
      { name:'entity_id', type:'VARCHAR(255)', note:'UUID of affected entity' },
      { name:'diff', type:'JSONB', nullable:true, note:'Before/after snapshot' },
      { name:'ip_address', type:'VARCHAR(45)', nullable:true },
      { name:'user_agent', type:'TEXT', nullable:true },
      { name:'created_at', type:'TIMESTAMPTZ', idx:true },
    ],
    indexes: ['ix_audit_log_org_id', 'ix_audit_log_user_id', 'ix_audit_log_action', 'ix_audit_log_created_at'],
    rls: ['audit_log_select: admins see all, others see own', 'audit_log_insert: org_id match only', 'NO update/delete — immutable'],
  },
  leads: {
    layer: 'phase1', desc: 'Intake form submissions from prospective clients. Stores full SurveyJS response payload in JSONB for flexible qualification.',
    columns: [
      { name:'id', type:'UUID', pk:true },
      { name:'org_id', type:'UUID', fk:'organizations.id', idx:true },
      { name:'email', type:'VARCHAR(320)', idx:true },
      { name:'full_name', type:'VARCHAR(255)' },
      { name:'company', type:'VARCHAR(255)', nullable:true },
      { name:'phone', type:'VARCHAR(50)', nullable:true },
      { name:'website', type:'TEXT', nullable:true },
      { name:'revenue_range', type:'VARCHAR(20)', nullable:true, note:'under_100k → 5m_plus' },
      { name:'qualification_status', type:'VARCHAR(20)', note:'new|reviewing|qualified|disqualified|converted' },
      { name:'score', type:'INTEGER', nullable:true, note:'Auto-calculated' },
      { name:'form_responses', type:'JSONB', note:'Full SurveyJS payload' },
      { name:'source', type:'VARCHAR(100)', nullable:true, note:'website|referral|instagram' },
      { name:'utm_source', type:'VARCHAR(255)', nullable:true },
      { name:'utm_medium', type:'VARCHAR(255)', nullable:true },
      { name:'utm_campaign', type:'VARCHAR(255)', nullable:true },
      { name:'notes', type:'TEXT', nullable:true },
      { name:'created_at', type:'TIMESTAMPTZ' },
      { name:'updated_at', type:'TIMESTAMPTZ' },
    ],
    indexes: ['ix_leads_org_id', 'ix_leads_email', 'ix_leads_qualification_status', 'ix_leads_form_responses (GIN)'],
    rls: ['org_isolation: org_id = current_user_org_id()'],
  },
  bookings: {
    layer: 'phase1', desc: 'Cal.com webhook data for scheduled discovery calls. Links to lead for conversion tracking. Stores full Cal.com payload for debugging.',
    columns: [
      { name:'id', type:'UUID', pk:true },
      { name:'org_id', type:'UUID', fk:'organizations.id', idx:true },
      { name:'lead_id', type:'UUID', fk:'leads.id', nullable:true, idx:true },
      { name:'cal_event_id', type:'VARCHAR(255)', unique:true, idx:true, note:'Cal.com UID for dedup' },
      { name:'cal_booking_uid', type:'VARCHAR(255)', nullable:true },
      { name:'event_type', type:'VARCHAR(100)', nullable:true, note:'discovery_call|strategy_session' },
      { name:'scheduled_at', type:'TIMESTAMPTZ', idx:true },
      { name:'duration_minutes', type:'INTEGER', note:'Default 30' },
      { name:'timezone', type:'VARCHAR(50)', nullable:true },
      { name:'attendee_name', type:'VARCHAR(255)', nullable:true },
      { name:'attendee_email', type:'VARCHAR(320)', nullable:true },
      { name:'status', type:'VARCHAR(20)', note:'pending|confirmed|cancelled|completed|no_show' },
      { name:'meeting_url', type:'TEXT', nullable:true },
      { name:'cal_payload', type:'JSONB', nullable:true, note:'Full webhook payload' },
      { name:'notes', type:'TEXT', nullable:true },
      { name:'created_at', type:'TIMESTAMPTZ' },
      { name:'updated_at', type:'TIMESTAMPTZ' },
    ],
    indexes: ['ix_bookings_org_id', 'ix_bookings_lead_id', 'ix_bookings_cal_event_id', 'ix_bookings_scheduled_at'],
    rls: ['org_isolation: org_id = current_user_org_id()'],
  },
  contacts: {
    layer: 'phase1', desc: 'Email subscribers — Flodesk migration target. UNIQUE(org_id, email) enables upsert. Tags use TEXT[] with GIN index for fast queries.',
    columns: [
      { name:'id', type:'UUID', pk:true },
      { name:'org_id', type:'UUID', fk:'organizations.id', idx:true },
      { name:'email', type:'VARCHAR(320)', idx:true },
      { name:'full_name', type:'VARCHAR(255)', nullable:true },
      { name:'tags', type:'TEXT[]', note:'GIN indexed for @> queries' },
      { name:'engagement_score', type:'INTEGER', note:'From opens, clicks, replies' },
      { name:'last_engaged_at', type:'TIMESTAMPTZ', nullable:true },
      { name:'subscribed', type:'BOOLEAN' },
      { name:'unsubscribed_at', type:'TIMESTAMPTZ', nullable:true },
      { name:'source', type:'VARCHAR(100)', nullable:true, note:'website_signup|lead_magnet|flodesk_import' },
      { name:'metadata', type:'JSONB', note:'Extra flexible data' },
      { name:'created_at', type:'TIMESTAMPTZ' },
      { name:'updated_at', type:'TIMESTAMPTZ' },
    ],
    indexes: ['uq_contacts_org_email (org_id, email) UNIQUE', 'ix_contacts_tags (GIN)'],
    rls: ['org_isolation: org_id = current_user_org_id()'],
  },
  pages: {
    layer: 'phase1', desc: 'CMS page content with structured JSONB blocks. Optimistic locking (version), soft deletes (is_deleted). Partial unique index on slug.',
    columns: [
      { name:'id', type:'UUID', pk:true },
      { name:'org_id', type:'UUID', fk:'organizations.id', idx:true },
      { name:'slug', type:'VARCHAR(255)', idx:true, note:'homepage|about|portfolio' },
      { name:'title', type:'VARCHAR(255)' },
      { name:'content', type:'JSONB', note:'Ordered array of content blocks' },
      { name:'meta_title', type:'VARCHAR(255)', nullable:true },
      { name:'meta_description', type:'TEXT', nullable:true },
      { name:'og_image_url', type:'TEXT', nullable:true },
      { name:'status', type:'VARCHAR(20)', note:'draft|published|archived' },
      { name:'version', type:'INTEGER', note:'Optimistic locking' },
      { name:'is_deleted', type:'BOOLEAN', note:'Soft delete' },
      { name:'last_edited_by', type:'UUID', fk:'users.id', nullable:true },
      { name:'created_at', type:'TIMESTAMPTZ' },
      { name:'updated_at', type:'TIMESTAMPTZ' },
    ],
    indexes: ['uq_pages_org_slug (org_id, slug) WHERE NOT deleted', 'ix_pages_content (GIN)'],
    rls: ['SELECT: all org members', 'INSERT/UPDATE: owner|admin|editor only', 'DELETE: owner|admin only'],
  },
  blog_posts: {
    layer: 'phase1', desc: 'Blog CMS with TipTap rich text. Supports scheduling, categories, tags, SEO. Optimistic locking + soft deletes.',
    columns: [
      { name:'id', type:'UUID', pk:true },
      { name:'org_id', type:'UUID', fk:'organizations.id', idx:true },
      { name:'slug', type:'VARCHAR(255)', idx:true },
      { name:'title', type:'VARCHAR(255)' },
      { name:'body', type:'TEXT', nullable:true, note:'TipTap HTML output' },
      { name:'excerpt', type:'VARCHAR(500)', nullable:true },
      { name:'category', type:'VARCHAR(100)', nullable:true, idx:true },
      { name:'tags', type:'TEXT[]', note:'GIN indexed' },
      { name:'cover_image_url', type:'TEXT', nullable:true },
      { name:'meta_title', type:'VARCHAR(255)', nullable:true },
      { name:'meta_description', type:'TEXT', nullable:true },
      { name:'status', type:'VARCHAR(20)', note:'draft|published|scheduled|archived' },
      { name:'published_at', type:'TIMESTAMPTZ', nullable:true, idx:true },
      { name:'scheduled_for', type:'TIMESTAMPTZ', nullable:true },
      { name:'author_id', type:'UUID', fk:'users.id', nullable:true, idx:true },
      { name:'version', type:'INTEGER', note:'Optimistic locking' },
      { name:'is_deleted', type:'BOOLEAN', note:'Soft delete' },
      { name:'reading_time_minutes', type:'INTEGER', nullable:true },
      { name:'created_at', type:'TIMESTAMPTZ' },
      { name:'updated_at', type:'TIMESTAMPTZ' },
    ],
    indexes: ['uq_blog_posts_org_slug (org_id, slug) WHERE NOT deleted', 'ix_blog_posts_tags (GIN)', 'ix_blog_posts_category', 'ix_blog_posts_published_at', 'ix_blog_posts_author_id'],
    rls: ['SELECT: all org members', 'INSERT/UPDATE: owner|admin|editor only', 'DELETE: owner|admin only'],
  },

// RENDER ERD

function renderERD() {
  const canvas = document.getElementById('erdCanvas');
  // Clear existing cards
  canvas.querySelectorAll('.table-card').forEach(c => c.remove());

  Object.entries(schema).forEach(([name, table]) => {
    const pos = positions[name];
    const card = document.createElement('div');
    card.className = 'table-card';
    card.id = `card-${name}`;
    card.style.left = pos.x + 'px';
    card.style.top = pos.y + 'px';
    card.onclick = () => openDetail(name);

    const badgeClass = table.layer === 'foundation' ? 'badge-foundation' : table.layer === 'cloudflare' ? 'badge-cloudflare' : 'badge-phase1';
    const badgeText = table.layer === 'foundation' ? 'Foundation' : table.layer === 'cloudflare' ? 'Cloudflare' : 'Phase 1';

    // Show max 8 important columns in ERD card
    const importantCols = table.columns.filter(c => c.pk || c.fk || c.idx || c.unique || ['status','role','content','body','form_responses','tags','metric_type','action','value','email','slug','title','name'].includes(c.name));
    const showCols = importantCols.slice(0, 8);
    const remainCount = table.columns.length - showCols.length;

    let colsHtml = showCols.map(c => {
      let icon = '';
      let iconClass = '';
      if (c.pk) { icon = '🔑'; iconClass = 'pk'; }
      else if (c.fk) { icon = '→'; iconClass = 'fk'; }
      else if (c.idx || c.unique) { icon = '◆'; iconClass = 'idx'; }
      else { icon = '·'; }
      return `<div class="col-row">
        <span class="col-icon ${iconClass}">${icon}</span>
        <span class="col-name">${c.name}</span>
        <span class="col-type">${c.type}</span>
      </div>`;
    }).join('');

    if (remainCount > 0) {
      colsHtml += `<div class="col-row"><span class="col-icon"></span><span class="col-name" style="color:var(--dim)">+${remainCount} more columns</span><span class="col-type"></span></div>`;
    }

    card.innerHTML = `
      <div class="table-header" style="border-left:3px solid var(--${table.layer === 'foundation' ? 'fnd' : table.layer === 'cloudflare' ? 'cf' : 'p1'})">
        <h3>${name}</h3>
        <span class="table-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="table-cols">${colsHtml}</div>
    `;
    canvas.appendChild(card);
  });

  // Set canvas size
  let maxX=0, maxY=0;
  Object.values(positions).forEach(p => {
    maxX = Math.max(maxX, p.x + 300);
    maxY = Math.max(maxY, p.y + 320);
  });
  canvas.style.minWidth = maxX + 'px';
  canvas.style.minHeight = (maxY + 40) + 'px';

  requestAnimationFrame(drawLines);
}

function drawLines() {
  const svg = document.getElementById('erdLines');
  const canvas = document.getElementById('erdCanvas');
  const canvasRect = canvas.getBoundingClientRect();
  svg.setAttribute('width', canvas.scrollWidth);
  svg.setAttribute('height', canvas.scrollHeight);
  svg.innerHTML = '';

  relationships.forEach(rel => {
    const fromCard = document.getElementById(`card-${rel.from}`);
    const toCard = document.getElementById(`card-${rel.to}`);
    if (!fromCard || !toCard) return;

    const fromRect = fromCard.getBoundingClientRect();
    const toRect = toCard.getBoundingClientRect();

    // Calculate centers relative to canvas
    const fx = fromRect.left - canvasRect.left + fromRect.width/2;
    const fy = fromRect.top - canvasRect.top + fromRect.height/2;
    const tx = toRect.left - canvasRect.left + toRect.width/2;
    const ty = toRect.top - canvasRect.top + toRect.height/2;

    // Find closest edges
    let x1, y1, x2, y2;
    const fromL = fromRect.left - canvasRect.left;
    const fromR = fromL + fromRect.width;
    const fromT = fromRect.top - canvasRect.top;
    const fromB = fromT + fromRect.height;
    const toL = toRect.left - canvasRect.left;
    const toR = toL + toRect.width;
    const toT = toRect.top - canvasRect.top;
    const toB = toT + toRect.height;

    // Simple edge connection
    if (fx < tx) { x1=fromR; x2=toL; } else { x1=fromL; x2=toR; }
    y1 = fy; y2 = ty;

    // If vertically stacked, use top/bottom edges
    if (Math.abs(fx - tx) < 150) {
      x1=fx; x2=tx;
      if (fy < ty) { y1=fromB; y2=toT; } else { y1=fromT; y2=toB; }
    }

    const midX = (x1+x2)/2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${x1},${y1} C${midX},${y1} ${midX},${y2} ${x2},${y2}`);
    path.setAttribute('class', `rel-line`);
    path.dataset.from = rel.from;
    path.dataset.to = rel.to;
    svg.appendChild(path);

    // Dot at target
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', x2);
    dot.setAttribute('cy', y2);
    dot.setAttribute('r', 4);
    dot.setAttribute('class', 'rel-dot');
    dot.dataset.from = rel.from;
    dot.dataset.to = rel.to;
    svg.appendChild(dot);
  });
}

// DETAIL PANEL
// ════════════════════════════════════════════════════════════
function openDetail(name) {
  const table = schema[name];
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');

  // Highlight selected card
  document.querySelectorAll('.table-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById(`card-${name}`);
  if (card) card.classList.add('selected');

  // Highlight relationship lines
  document.querySelectorAll('.rel-line, .rel-dot').forEach(el => {
    if (el.dataset.from === name || el.dataset.to === name) {
      el.classList.add('highlighted');
    } else {
      el.classList.remove('highlighted');
    }
  });

  const badgeClass = table.layer === 'foundation' ? 'badge-foundation' : 'badge-phase1';
  const badgeText = table.layer === 'foundation' ? 'Foundation' : 'Phase 1';

  const colsHtml = table.columns.map(c => {
    let constraints = [];
    if (c.pk) constraints.push('PK');
    if (c.fk) constraints.push(`FK → ${c.fk}`);
    if (c.unique) constraints.push('UNIQUE');
    if (c.idx) constraints.push('INDEXED');
    if (c.nullable) constraints.push('nullable');
    const notes = [c.note, ...constraints].filter(Boolean).join(' · ');
    return `<div class="detail-col">
      <span class="dcn">${c.pk ? '🔑 ' : c.fk ? '→ ' : ''}${c.name}</span>
      <span class="dct">${c.type}</span>
      <span class="dcc">${notes}</span>
    </div>`;
  }).join('');

  const rels = relationships.filter(r => r.from === name || r.to === name);
  const relsHtml = rels.length ? rels.map(r => {
    if (r.from === name) {
      return `<div class="detail-rel"><span>${name}.${r.fromCol}</span> → <span>${r.to}.${r.toCol}</span></div>`;
    } else {
      return `<div class="detail-rel"><span>${r.from}.${r.fromCol}</span> → <span>${name}.${r.toCol}</span></div>`;
    }
  }).join('') : '<div style="color:var(--dim);font-size:0.85rem">No foreign key relationships</div>';

  const idxHtml = table.indexes.map(i => `<div class="detail-idx"><span class="idx-name">${i}</span></div>`).join('');
  const rlsHtml = table.rls.map(r => `<div class="detail-rls"><strong>Policy:</strong> ${r}</div>`).join('');

  content.innerHTML = `
    <h2>${name} <span class="table-badge ${badgeClass}" style="font-size:0.6rem;vertical-align:middle;margin-left:8px">${badgeText}</span></h2>
    <p class="detail-desc">${table.desc}</p>

    <div class="detail-section">
      <h4>Columns (${table.columns.length})</h4>
      ${colsHtml}
    </div>

    <div class="detail-section">
      <h4>Relationships</h4>
      ${relsHtml}
    </div>

    <div class="detail-section">
      <h4>Indexes</h4>
      ${idxHtml}
    </div>

    <div class="detail-section">
      <h4>Row-Level Security</h4>
      ${rlsHtml}
    </div>
  `;

  panel.classList.add('open');
}

document.getElementById('detailClose').onclick = () => {
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.table-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.rel-line, .rel-dot').forEach(el => el.classList.remove('highlighted'));
};

<span class="kw">SELECT</span> <span class="fn">set_config</span>(<span class="str">'app.current_org_id'</span>, <span class="str">':org_id'</span>, <span class="str">true</span>);<br>

<span class="cm">-- What your code writes:</span><br>

<span class="cm">-- What Postgres actually runs:</span><br>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> leads<br>
<span class="kw">WHERE</span> org_id = <span class="fn">current_setting</span>(<span class="str">'app.current_org_id'</span>)::<span class="kw">UUID</span>;
          </div>

});
