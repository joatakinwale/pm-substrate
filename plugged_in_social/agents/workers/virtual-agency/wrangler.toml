# Virtual Agency — Cloudflare Worker
#
# Receives virtual_agency.task queue messages, then POSTs each payload to the
# FastAPI internal endpoint /api/internal/virtual-agency/task. FastAPI owns
# tenant/RLS checks, approval freshness, dependency gates, content-hash gates,
# write mutations, event hashes, and durable task completion. This Worker is
# the queue consumer + retry orchestrator only.
#
# Why this split: the multi-agent work graph and write policies already live in
# Python with full DB/model/service access. The Worker only needs the
# ack/retry decision tree, identical in shape to stripe-sync and ai-content.
#
# max_retries=3. Re-running an agent task can have observable side effects
# unless backend idempotency gates catch the duplicate. Anything not recovering
# after 3 tries belongs in the DLQ for operator review.

name = "stevie-virtual-agency"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
# BACKEND_BASE_URL set per-env via secrets; never hard-coded.

# Queue this Worker consumes from. The producer (FastAPI) sends to the same name.
[[queues.consumers]]
queue = "stevie-virtual-agency"
max_batch_size = 5
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "stevie-virtual-agency-dlq"

# ── Production env ──────────────────────────────────────────────────
[env.production]
name = "stevie-virtual-agency-production"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.queues.consumers]]
queue = "stevie-virtual-agency-production"
max_batch_size = 5
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "stevie-virtual-agency-production-dlq"

# ── Staging env ─────────────────────────────────────────────────────
[env.staging]
name = "stevie-virtual-agency-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.queues.consumers]]
queue = "stevie-virtual-agency-staging"
max_batch_size = 5
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "stevie-virtual-agency-staging-dlq"

# Secrets to set per-env via `wrangler secret put`:
#   WEBHOOK_SECRET      — must match backend's WEBHOOK_SECRET env var
#   BACKEND_BASE_URL    — e.g. https://api.stevie.social
