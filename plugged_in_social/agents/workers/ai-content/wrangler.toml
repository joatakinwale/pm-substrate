# AI Content Generation — Cloudflare Worker
#
# Receives a queue message containing {request_id, org_id, ...}, calls FastAPI
# to fetch a pre-built prompt, routes to one of several AI providers via
# Cloudflare AI Gateway, then POSTs the generated content + token usage +
# latency back to the FastAPI internal endpoint which performs the DB UPDATE
# under RLS (and computes cost_cents from model + tokens).
#
# Provider routing (see src/providers.ts):
#   model "claude-*"    → /anthropic/v1/messages              (ANTHROPIC_API_KEY)
#   model "gpt-*"|"o3-*"→ /openai/chat/completions            (OPENAI_API_KEY)
#   model "@cf/*"       → /workers-ai/{model}                 (CF_WORKERS_AI_TOKEN)
#   model "gemini-*"    → /google-ai-studio/v1/...            (GOOGLE_AI_API_KEY)
#
# Per-provider keys are LAZILY validated — only the providers you actually
# generate against need a key set. An org running purely on Workers AI doesn't
# need an Anthropic key on the Worker.
#
# Why AI Gateway (not direct provider URLs): caching, retries, observability,
# and rate-limit smoothing are free at the gateway. We hit it via raw fetch
# instead of pulling in vendor SDKs — the wire format is identical, the
# bundle is smaller, and we get explicit control over retry classification.

name = "stevie-ai-content"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
# BACKEND_BASE_URL, CF_AI_GATEWAY_URL set per-env via secrets; never hard-coded.

# Queue this Worker consumes from. The producer (FastAPI) sends to the same name.
#
# max_retries=5 + CF Queues' exponential backoff covers transient
# Anthropic / OpenAI / Workers AI errors (5xx, 429, 408, 425). Permanent
# failures (PermanentError — auth errors, bad request, safety refusals)
# are ack()'d immediately and do NOT count against this budget; only
# RetryableError does. Anything still failing after 5 retries lands in
# the DLQ for an operator to inspect.
[[queues.consumers]]
queue = "stevie-ai-content"
max_batch_size = 5
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "stevie-ai-content-dlq"

# ── Production env ──────────────────────────────────────────────────
[env.production]
name = "stevie-ai-content-production"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.queues.consumers]]
queue = "stevie-ai-content-production"
max_batch_size = 5
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "stevie-ai-content-production-dlq"

# ── Staging env ─────────────────────────────────────────────────────
[env.staging]
name = "stevie-ai-content-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.queues.consumers]]
queue = "stevie-ai-content-staging"
max_batch_size = 5
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "stevie-ai-content-staging-dlq"

# Secrets to set per-env via `wrangler secret put`:
#   CF_AI_GATEWAY_URL   — gateway BASE URL (NO provider suffix), e.g.
#       https://gateway.ai.cloudflare.com/v1/{account_id}/{gateway_id}
#       Older Anthropic-only deployments that pinned the URL to
#       ``.../anthropic`` still work — providers.ts strips the trailing
#       segment for backwards compat.
#   CF_AIG_TOKEN        — optional AI Gateway auth token. Required only if
#                         Authenticated Gateway is enabled.
#   WEBHOOK_SECRET      — must match backend's WEBHOOK_SECRET env var
#   BACKEND_BASE_URL    — e.g. https://api.stevie.social
#
# Per-provider API keys (set the ones you intend to use):
#   ANTHROPIC_API_KEY   — for claude-* models
#   OPENAI_API_KEY      — for gpt-* / o3-* models
#   CF_WORKERS_AI_TOKEN — Cloudflare API token with Workers AI Read scope,
#                         used for @cf/* models. NOT the same as the
#                         account-level CF_API_TOKEN.
#   GOOGLE_AI_API_KEY   — for gemini-* models
