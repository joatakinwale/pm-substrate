# Stevie Queue Producer
#
# Tiny shared Worker. FastAPI POSTs JSON messages to it; the Worker forwards
# them to the named Cloudflare Queue via the binding. This exists because
# FastAPI runs on DigitalOcean and has no native Cloudflare bindings — we
# need *one* Cloudflare ingress to bridge the two.
#
# Auth: shared `X-Webhook-Secret` header, same as backend's verify_webhook_secret.
#
# Endpoint shape:  POST /enqueue/{queue}      body: any JSON message

name = "stevie-queue-producer"
main = "src/index.ts"
compatibility_date = "2024-12-30"

[vars]
ENVIRONMENT = "development"

# One binding per queue this Worker can publish to. Binding name =
# SCREAMING_SNAKE of the queue slug. Each binding here must also be in
# the QUEUE_BINDINGS allow-list in src/index.ts and have a matching
# consumer Worker in workers/<slug>/.
[[queues.producers]]
queue = "stevie-stripe-sync"
binding = "QUEUE_STRIPE_SYNC"

[[queues.producers]]
queue = "stevie-email-sender"
binding = "QUEUE_EMAIL_SENDER"

[[queues.producers]]
queue = "stevie-ai-content"
binding = "QUEUE_AI_CONTENT"

[[queues.producers]]
queue = "stevie-report-builder"
binding = "QUEUE_REPORT_BUILDER"

[[queues.producers]]
queue = "stevie-automation-runner"
binding = "QUEUE_AUTOMATION_RUNNER"

[[queues.producers]]
queue = "stevie-social-publisher"
binding = "QUEUE_SOCIAL_PUBLISHER"

[[queues.producers]]
queue = "stevie-virtual-agency"
binding = "QUEUE_VIRTUAL_AGENCY"

# ── Production env ──────────────────────────────────────────────────
[env.production]
name = "stevie-queue-producer-production"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.queues.producers]]
queue = "stevie-stripe-sync-production"
binding = "QUEUE_STRIPE_SYNC"

[[env.production.queues.producers]]
queue = "stevie-email-sender-production"
binding = "QUEUE_EMAIL_SENDER"

[[env.production.queues.producers]]
queue = "stevie-mux-ingest-production"
binding = "QUEUE_MUX_INGEST"

[[env.production.queues.producers]]
queue = "stevie-ai-content-production"
binding = "QUEUE_AI_CONTENT"

[[env.production.queues.producers]]
queue = "stevie-report-builder-production"
binding = "QUEUE_REPORT_BUILDER"

[[env.production.queues.producers]]
queue = "stevie-automation-runner-production"
binding = "QUEUE_AUTOMATION_RUNNER"

[[env.production.queues.producers]]
queue = "stevie-social-publisher-production"
binding = "QUEUE_SOCIAL_PUBLISHER"

[[env.production.queues.producers]]
queue = "stevie-virtual-agency-production"
binding = "QUEUE_VIRTUAL_AGENCY"

# ── Staging env ─────────────────────────────────────────────────────
[env.staging]
name = "stevie-queue-producer-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.queues.producers]]
queue = "stevie-stripe-sync-staging"
binding = "QUEUE_STRIPE_SYNC"

[[env.staging.queues.producers]]
queue = "stevie-email-sender-staging"
binding = "QUEUE_EMAIL_SENDER"

[[env.staging.queues.producers]]
queue = "stevie-mux-ingest-staging"
binding = "QUEUE_MUX_INGEST"

[[env.staging.queues.producers]]
queue = "stevie-ai-content-staging"
binding = "QUEUE_AI_CONTENT"

[[env.staging.queues.producers]]
queue = "stevie-report-builder-staging"
binding = "QUEUE_REPORT_BUILDER"

[[env.staging.queues.producers]]
queue = "stevie-automation-runner-staging"
binding = "QUEUE_AUTOMATION_RUNNER"

[[env.staging.queues.producers]]
queue = "stevie-social-publisher-staging"
