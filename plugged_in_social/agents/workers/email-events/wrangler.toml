# Email Events — Cloudflare Worker
#
# Resend posts webhook events here directly (Svix-signed). The Worker
# verifies the signature, validates the event type, and forwards the
# cleaned payload to FastAPI POST /api/internal/email/events which
# performs the DB UPDATE under RLS.
#
# Why a fetch handler (not a queue): Resend already retries on non-2xx
# for ~72h, so we don't need an intermediate queue. Resend → Worker →
# backend internal endpoint, three hops, signature verified at the edge.

name = "stevie-email-events"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
# BACKEND_BASE_URL set per-env via secrets; never hard-coded.

# ── Production env ──────────────────────────────────────────────────
[env.production]
name = "stevie-email-events-production"

[env.production.vars]
ENVIRONMENT = "production"

# ── Staging env ─────────────────────────────────────────────────────
[env.staging]
name = "stevie-email-events-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

# Secrets to set per-env via `wrangler secret put`:
#   RESEND_WEBHOOK_SECRET — Svix endpoint secret from the Resend dashboard
#                          (begins with "whsec_"). Used to verify the
#                          Svix-Id / Svix-Timestamp / Svix-Signature headers.
#   WEBHOOK_SECRET        — must match backend's WEBHOOK_SECRET env var
#   BACKEND_BASE_URL      — e.g. https://api.stevie.social
