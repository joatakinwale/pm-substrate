# Billing Cron — Cloudflare Worker (scheduled handler)
#
# Owns the daily payment-reminder sweep.
#
# Flow:
#   1. Cloudflare Cron Trigger fires this Worker daily at 09:00 UTC.
#   2. Worker POSTs /internal/billing/reminders/sweep on FastAPI; the
#      backend bumps reminder counters and returns the email payload list.
#   3. Worker POSTs each payload to the queue-producer Worker's
#      /enqueue/stevie-email-sender route as an email.notification message.
#
# This Worker is NOT a queue consumer — there's no [[queues.consumers]]
# block. It's a thin orchestrator over two HTTP hops.

name = "stevie-billing-cron"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
# BACKEND_BASE_URL and QUEUE_PRODUCER_URL set per-env via secrets; never hard-coded.

# Cron Trigger — daily at 09:00 UTC. Picked to land in clients'
# morning regardless of timezone bias and to give the office a workday
# to follow up on bounces.
[triggers]
crons = ["0 9 * * *"]

# ── Production env ──────────────────────────────────────────────────
[env.production]
name = "stevie-billing-cron-production"

[env.production.vars]
ENVIRONMENT = "production"

[env.production.triggers]
crons = ["0 9 * * *"]

# ── Staging env ─────────────────────────────────────────────────────
[env.staging]
name = "stevie-billing-cron-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[env.staging.triggers]
crons = ["0 9 * * *"]

# Secrets to set per-env via `wrangler secret put`:
#   WEBHOOK_SECRET      — must match backend's WEBHOOK_SECRET env var
#   BACKEND_BASE_URL    — e.g. https://api.stevie.social
#   QUEUE_PRODUCER_URL  — base URL of the stevie-queue-producer Worker,
#                         e.g. https://stevie-queue-producer.workers.dev
