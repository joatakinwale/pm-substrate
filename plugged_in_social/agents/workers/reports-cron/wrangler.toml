# Reports Cron — Cloudflare Worker (scheduled handler)
#
# Owns the daily sweep that fires due monthly client reports.
#
# Flow:
#   1. Cloudflare Cron Trigger fires this Worker daily at 02:00 UTC.
#   2. Worker POSTs /internal/reports/sweep-due on FastAPI; the backend
#      walks active ReportSchedule rows whose next_run_at has passed,
#      builds a metrics snapshot per row, inserts a ClientReport with
#      status='pending', advances the schedule cadence, and returns the
#      list of {client_report_id, org_id} the Worker must hand off.
#   3. Worker POSTs each entry to the queue-producer Worker's
#      /enqueue/stevie-report-builder route as a report.build message.
#      The actual PDF render Worker (stevie-report-builder) is a future
#      migration — until it ships, messages sit on the queue (CF Queues
#      hold messages up to 4 days) and that's by design.
#
# This Worker is NOT a queue consumer — there's no [[queues.consumers]]
# block. It's a thin orchestrator over two HTTP hops.

name = "stevie-reports-cron"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
# BACKEND_BASE_URL and QUEUE_PRODUCER_URL set per-env via secrets; never hard-coded.

# Cron Trigger — daily at 02:00 UTC. Off-peak so the metrics-snapshot
# scan doesn't fight live API traffic. A monthly schedule's
# next_run_at is what gates actual fan-out, not this cron tick — the
# tick just makes sure we check at least once per day.
[triggers]
crons = ["0 2 * * *"]

# ── Production env ──────────────────────────────────────────────────
[env.production]
name = "stevie-reports-cron-production"

[env.production.vars]
ENVIRONMENT = "production"

[env.production.triggers]
crons = ["0 2 * * *"]

# ── Staging env ─────────────────────────────────────────────────────
[env.staging]
name = "stevie-reports-cron-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[env.staging.triggers]
crons = ["0 2 * * *"]

# Secrets to set per-env via `wrangler secret put`:
#   WEBHOOK_SECRET      — must match backend's WEBHOOK_SECRET env var
#   BACKEND_BASE_URL    — e.g. https://api.stevie.social
#   QUEUE_PRODUCER_URL  — base URL of the stevie-queue-producer Worker,
#                         e.g. https://stevie-queue-producer.workers.dev
