# Stripe Invoice Sync — Cloudflare Worker
#
# Replaces backend/app/tasks/billing_tasks.py::sync_stripe_invoice.
# Receives a queue message containing {invoice_id, stripe_invoice_id, org_id},
# fetches the latest invoice state from Stripe, then POSTs the synced fields
# back to the FastAPI internal endpoint which performs the DB UPDATE under RLS.
#
# Why a queue (not a webhook): Stripe webhooks fire on every event; we need
# explicit reconciliation (e.g. after a manual void/refund). The webhook path
# stays on FastAPI; this Worker is for pull-style sync.

name = "stevie-stripe-sync"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
# BACKEND_BASE_URL set per-env via secrets; never hard-coded.

# Queue this Worker consumes from. The producer (FastAPI) sends to the same name.
[[queues.consumers]]
queue = "stevie-stripe-sync"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "stevie-stripe-sync-dlq"

# ── Production env ──────────────────────────────────────────────────
[env.production]
name = "stevie-stripe-sync-production"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.queues.consumers]]
queue = "stevie-stripe-sync-production"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "stevie-stripe-sync-production-dlq"

# ── Staging env ─────────────────────────────────────────────────────
[env.staging]
name = "stevie-stripe-sync-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.queues.consumers]]
queue = "stevie-stripe-sync-staging"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "stevie-stripe-sync-staging-dlq"

# Secrets to set per-env via `wrangler secret put`:
#   STRIPE_SECRET_KEY   — same key currently in backend/.env
#   WEBHOOK_SECRET      — must match backend's WEBHOOK_SECRET env var
#   BACKEND_BASE_URL    — e.g. https://api.stevie.social
