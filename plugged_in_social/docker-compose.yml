###############################################################################
# Stevie Social — Local Development Stack
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f api    # Follow API logs
#   docker compose down           # Stop everything
#
# This runs:
#   - PostgreSQL 16 (port 5432) with stevie_dev database
#   - FastAPI backend (port 8000) with hot-reload
#   - Next.js frontend (port 3000) with Turbopack dev server
#
# Supabase Auth is external (hosted) — set SUPABASE_* vars in .env
###############################################################################

services:
  # ═══ PostgreSQL ═══
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: stevie_dev
      POSTGRES_USER: stevie
      POSTGRES_PASSWORD: stevie_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stevie -d stevie_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ═══ Redis ═══
  # NOT a task broker. Redis is here for slowapi (rate limiting), the
  # realtime SSE pub/sub fallback, activity log streaming, and the
  # proposal cascade. Background jobs and scheduled work live on
  # Cloudflare Workers + Queues (see /agents and /workers).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ═══ FastAPI Backend ═══
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://stevie:stevie_dev_password@db:5432/stevie_dev
      DATABASE_URL_SYNC: postgresql+psycopg://stevie:stevie_dev_password@db:5432/stevie_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app  # Hot-reload source code
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ═══ Next.js Frontend ═══
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src  # Hot-reload source code
      - ./frontend/public:/app/public
    command: npm run dev

volumes:
  pgdata:
