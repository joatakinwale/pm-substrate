services:
  postgres:
    image: postgres:17-alpine
    container_name: pm-substrate-postgres
    environment:
      POSTGRES_USER: pm
      POSTGRES_PASSWORD: pm_dev_password
      POSTGRES_DB: pm_substrate
    ports:
      - "127.0.0.1:${PM_DB_PORT:-5432}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c max_connections=200
      -c log_statement=none
      -c log_min_duration_statement=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pm -d pm_substrate"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: pm-substrate-pgweb
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://pm:pm_dev_password@postgres:5432/pm_substrate?sslmode=disable
    ports:
      - "127.0.0.1:8081:8081"
